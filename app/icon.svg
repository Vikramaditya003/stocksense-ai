<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Green rounded-square badge -->
  <rect width="100" height="100" rx="22" fill="#22C55E"/>
  <!-- Dark border -->
  <rect x="3.5" y="3.5" width="93" height="93" rx="19" fill="none" stroke="#0D1F2D" stroke-width="5"/>
  <!-- Trunk -->
  <rect x="43" y="75" width="14" height="10" rx="2" fill="white"/>
  <!-- Bottom tier -->
  <polygon points="50,42 9,77 91,77" fill="white"/>
  <!-- Middle tier -->
  <polygon points="50,29 19,60 81,60" fill="white"/>
  <!-- Top tier -->
  <polygon points="50,17 31,46 69,46" fill="white"/>
  <!-- Lower chart line -->
  <polyline points="14,70 31,53 45,63 63,39" stroke="#1ea854" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Upper chart line -->
  <polyline points="17,63 34,46 48,56 66,32" stroke="#1ea854" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow shaft -->
  <line x1="66" y1="32" x2="77" y2="19" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="85,12 74,21 68,14" fill="white"/>
</svg>
